name: Build luci-app-adguardhome

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-pip python3-setuptools \
            python3-dev rsync unzip zlib1g-dev file wget curl subversion swig \
            pkg-config cpio

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git ~/immortalwrt

      - name: Add feeds
        run: |
          cd ~/immortalwrt
          echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
          echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-adguardhome

      - name: Fix fwupd bug
        run: |
          cd ~/immortalwrt
          rm -rf feeds/packages/utils/fwupd || true

      - name: Configure
        run: |
          cd ~/immortalwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          EOF
          make defconfig

      - name: Build tools & toolchain
        run: |
          cd ~/immortalwrt
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      - name: Build package
        run: |
          cd ~/immortalwrt
          make package/luci-app-adguardhome/compile -j$(nproc)

      - name: Collect ipk
        run: |
          mkdir -p ~/artifacts
          find ~/immortalwrt/bin/packages -name "*adguardhome*.ipk" -exec cp {} ~/artifacts/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: adguardhome-ipk
          path: ~/artifacts/
